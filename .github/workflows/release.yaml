name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify dist layout
        run: |
          set -euo pipefail
          test -f dist/byd-3d-card-hacs.js
          test -f dist/byd-3d-card.js

      - name: Package dist as zip
        run: |
          cd dist
          zip -r ../BYD-CARD.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            BYD-CARD.zip
            dist/byd-3d-card-hacs.js
            dist/byd-3d-card.js
